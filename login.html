<!doctype html>
<html lang="en" data-fallback-version="v12.2.21">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0f4d1d">
  <title>Dowson Farms — Login</title>
  <link rel="icon" href="icons/logo.png">
  <style>
    :root{
      --bg:#f6f3e4; --panel:#ffffff; --fg:#1a1a1a; --muted:#6e6e6e;
      --brand:#0f4d1d; --bd:rgba(0,0,0,.08); --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:22px; --ctl-h:48px;
    }
    html,body{height:100%}
    body{
      margin:0; background:var(--bg); color:var(--fg);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
      -webkit-text-size-adjust:100%;
    }

    .wrap{min-height:100%; display:flex; flex-direction:column;}
    .main{flex:1; display:flex; align-items:center; justify-content:center; padding:28px 14px;}

    .card{
      width:min(680px, 92vw);
      background:var(--panel); border:1px solid var(--bd); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:26px; position:relative;
    }
    .brand{
      position:absolute; left:50%; transform:translate(-50%,-56%);
      width:92px; height:92px; border-radius:50%; border:8px solid var(--panel);
      box-shadow:0 8px 28px rgba(0,0,0,.10); background:#fff; display:grid; place-items:center;
      overflow:hidden;
    }
    .brand img{width:100%; height:100%; object-fit:cover}

    .title{ margin-top:48px; text-align:center; }
    .title h1{font-size:34px; margin:0 0 4px; letter-spacing:.3px;}
    .title p{margin:0; color:var(--muted); font-size:18px;}

    .field{margin:14px 0;}
    .label{display:block; font-weight:700; margin-bottom:6px;}
    .row{
      display:grid; grid-template-columns: 1fr 96px; gap:10px; align-items:center;
    }
    input[type="email"], input[type="password"], input[type="text"]{
      font-size:16px; /* avoid iOS zoom */
      height:var(--ctl-h); line-height:calc(var(--ctl-h) - 2px);
      padding:0 14px; border:1px solid var(--bd); border-radius:12px; background:#fff;
      outline:none;
    }
    .toggle{
      height:var(--ctl-h);
      border:1px solid var(--bd); background:#fff; border-radius:12px;
      font-weight:700; color:var(--brand); width:96px; cursor:pointer;
    }

    .actions{
      margin-top:12px; display:flex; align-items:center; justify-content:space-between; gap:12px;
      flex-wrap:wrap;
    }
    .link{color:var(--brand); font-weight:700; text-decoration:none}
    .btn{
      background:var(--brand); color:#fff; border:0; border-radius:16px; padding:14px 22px;
      font-weight:800; min-width:120px; cursor:pointer;
    }
    .error{margin-top:8px; color:#b00020; font-weight:700; display:none;}

    footer{
      border-top:1px solid var(--bd); background:#efe9d0;
      padding:12px; text-align:center; color:#6e6e6e; font-weight:600;
    }
    .dot{margin:0 .45rem; opacity:.7}
  </style>
</head>
<body>
  <div class="wrap">
    <main class="main" role="main">
      <section class="card" aria-label="Login">
        <div class="brand">
          <!-- Try relative first; if it fails, fall back to absolute -->
          <img id="dfLogo" src="icons/logo.png" alt="Dowson Farms logo"
               onerror="this.onerror=null; this.src='/icons/logo.png'">
        </div>

        <div class="title">
          <h1>Dowson Farms</h1>
          <p>Welcome back. Sign in to continue.</p>
        </div>

        <form id="loginForm" novalidate>
          <div class="field">
            <label class="label" for="email">Username</label>
            <input id="email" name="email" type="email" inputmode="email" autocomplete="username"
                   placeholder="Email" required>
          </div>

          <div class="field">
            <label class="label" for="password">Password</label>
            <div class="row">
              <input id="password" name="password" type="password" autocomplete="current-password"
                     placeholder="Password" required>
              <button type="button" class="toggle" id="togglePw" aria-pressed="false">Show</button>
            </div>
          </div>

          <div class="actions">
            <a class="link" href="#" id="forgotLink">Forgot password?</a>
            <button class="btn" type="submit">Log In</button>
          </div>

          <div class="error" id="errorBox" role="alert"></div>
        </form>
      </section>
    </main>

    <footer>
      <span id="dateText"></span><span class="dot">•</span><span id="verText">v0.0.0</span>
    </footer>
  </div>

  <script>
    (function(){
      'use strict';

      const $ = (s,r=document)=>r.querySelector(s);

      // --- date + version ---
      const ord = n => (n%10==1&&n%100!=11)?'st':(n%10==2&&n%100!=12)?'nd':(n%10==3&&n%100!=13)?'rd':'th';
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const d = new Date();
      $('#dateText').textContent = `${months[d.getMonth()]} ${d.getDate()}${ord(d.getDate())} ${d.getFullYear()}`;

      const pickVersion = ()=>{
        if (window.DF && window.DF.VERSION) return window.DF.VERSION;
        try { const v = localStorage.getItem('df_version'); if (v) return v; } catch {}
        return document.documentElement.getAttribute('data-fallback-version') || 'v0.0.0';
      };
      $('#verText').textContent = pickVersion();

      // --- show/hide password (height stays fixed) ---
      const pw = $('#password');
      const tgl = $('#togglePw');
      tgl.addEventListener('click', ()=>{
        const show = pw.type === 'password';
        pw.type = show ? 'text' : 'password';
        tgl.textContent = show ? 'Hide' : 'Show';
        tgl.setAttribute('aria-pressed', show ? 'true' : 'false');
      });

      // --- demo login ---
      const DEMO_EMAIL = 'demo@dowsonfarms.com';
      const DEMO_PASS  = 'Demo123';
      const errorBox = $('#errorBox');
      const showError = (msg)=>{ errorBox.textContent = msg; errorBox.style.display='block'; };
      const clearError = ()=>{ errorBox.textContent=''; errorBox.style.display='none'; };

      $('#loginForm').addEventListener('submit', (e)=>{
        e.preventDefault();
        clearError();
        const email = String($('#email').value || '').trim().toLowerCase();
        const pass  = String($('#password').value || '');

        if (email === DEMO_EMAIL && pass === DEMO_PASS) {
          try { localStorage.setItem('df_user', email); } catch {}
          location.href = '/#\/home';
        } else {
          showError('These credentials are not recognized.');
        }
      });

      // --- forgot password (demo) ---
      $('#forgotLink').addEventListener('click', (e)=>{
        e.preventDefault();
        const input = prompt('Enter your email to reset your password:');
        if (!input) return;
        const email = String(input).trim().toLowerCase();
        if (email === DEMO_EMAIL) {
          alert('Reset link sent (demo). Check your inbox.');
          const subj = encodeURIComponent('Password reset request');
          const body = encodeURIComponent('Hi,\n\nPlease reset my password for Dowson Farms.\n\nThanks,\n'+email);
          location.href = `mailto:${email}?subject=${subj}&body=${body}`;
        } else {
          alert('No account found for that email.');
        }
      });

      // Clean URL if someone arrives with a hash
      if (location.hash && location.pathname.endsWith('/login.html')) {
        history.replaceState(null, '', '/login.html');
      }
    })();
  </script>
</body>
</html>
