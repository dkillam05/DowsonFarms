<!doctype html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Login • Dowson Farms</title>
  <link rel="icon" href="icons/logo.png">
  <style>
    :root{
      --bg:#f6f3e4; --card:#ffffff; --fg:#1a1a1a; --muted:#6e6e6e; --brand:#0f4d1d; --bd:rgba(0,0,0,.08);
    }
    html,body{height:100%;}
    body{
      margin:0; background:var(--bg); color:var(--fg);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      display:flex; align-items:center; justify-content:center;
      padding:24px;
    }
    .wrap{ width:100%; max-width:420px; }
    .logo{
      display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:14px;
    }
    .logo img{ width:56px; height:56px; border-radius:12px; }
    .logo .brand{ font-weight:800; font-size:22px; letter-spacing:.2px; }
    .card{
      background:var(--card); border:1px solid var(--bd); border-radius:14px; padding:18px 16px;
      box-shadow:0 6px 18px rgba(0,0,0,.06);
    }
    .title{ font-size:22px; font-weight:800; margin:0 0 6px; }
    .muted{ color:var(--muted); }
    .field{ margin:10px 0; }
    .label{ display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
    .input{
      display:flex; align-items:center; gap:8px;
      border:1px solid var(--bd); border-radius:12px; background:#fff;
      padding:10px 12px;
    }
    /* prevent iOS zoom on focus by ensuring >=16px font-size */
    input{
      border:0; outline:0; flex:1; font-size:16px; line-height:1.2; background:transparent;
    }
    .btn-primary{
      width:100%; padding:10px 12px; border:0; border-radius:12px;
      background:var(--brand); color:#fff; font-weight:700; cursor:pointer;
    }
    .row{ display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .link{ color:inherit; text-decoration:none; font-weight:600; }
    .foot{
      text-align:center; color:var(--muted); margin-top:12px; font-weight:600;
      display:flex; gap:8px; align-items:center; justify-content:center; flex-wrap:wrap;
    }
    .eye-btn{ border:0; background:transparent; cursor:pointer; font-size:14px; color:var(--muted); }
  </style>
  <script defer src="app.js"></script>
</head>
<body>
  <main class="wrap" role="main">
    <div class="logo">
      <img src="icons/logo.png" alt="Dowson Farms">
      <div class="brand">Dowson Farms</div>
    </div>

    <section class="card" aria-label="Login">
      <h1 class="title">Welcome back</h1>
      <p class="muted" style="margin-top:0;">Sign in to continue.</p>

      <div class="field">
        <label class="label" for="li-email">Email</label>
        <div class="input">
          <input id="li-email" type="email" autocomplete="username" placeholder="you@example.com" inputmode="email">
        </div>
      </div>

      <div class="field">
        <label class="label" for="li-pass">Password</label>
        <div class="input">
          <input id="li-pass" type="password" autocomplete="current-password" placeholder="Password">
          <button type="button" id="togglePass" class="eye-btn" aria-label="Show password">Show</button>
        </div>
      </div>

      <div class="row" style="margin:10px 0 6px;">
        <a class="link" id="forgotLink" href="#" role="button">Forgot password?</a>
        <span class="muted" id="policy">Min 6 chars, 1 capital, 1 number</span>
      </div>

      <button id="li-go" class="btn-primary">Log In</button>
    </section>

    <div class="foot">
      <span id="foot-date">—</span>
      <span aria-hidden="true">•</span>
      <span id="foot-time">—</span>
      <span aria-hidden="true">•</span>
      <span id="foot-ver">v0.0.0</span>
    </div>
  </main>

  <script>
    (function(){
      // Time & date
      function fmtDate(d){
        const opts = { year:'numeric', month:'long', day:'numeric' };
        return new Intl.DateTimeFormat(undefined, opts).format(d);
      }
      function fmtTime(d){
        const opts = { hour:'numeric', minute:'2-digit' };
        return new Intl.DateTimeFormat(undefined, opts).format(d);
      }
      function tick(){
        const now = new Date();
        document.getElementById('foot-date').textContent = fmtDate(now);
        document.getElementById('foot-time').textContent = fmtTime(now);
      }
      tick(); setInterval(tick, 15_000);

      // Version (from app.js Part 1)
      try{
        const v = (window.DF && window.DF.VERSION) ? window.DF.VERSION : 'v0.0.0';
        document.getElementById('foot-ver').textContent = v;
      }catch{}

      // Show/Hide password
      const pass = document.getElementById('li-pass');
      const tog  = document.getElementById('togglePass');
      tog.addEventListener('click', ()=>{
        const show = pass.type === 'password';
        pass.type = show ? 'text' : 'password';
        tog.textContent = show ? 'Hide' : 'Show';
        tog.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
      });

      // Forgot password (stub for now)
      document.getElementById('forgotLink').addEventListener('click', (e)=>{
        e.preventDefault();
        const email = (document.getElementById('li-email').value || '').trim();
        if (!email) { alert('Enter your email first.'); return; }
        // In real app: call backend to send reset if account exists
        alert('If an account exists for '+email+', a reset link will be sent.');
      });

      // Validate + login
      function passwordOK(pw){
        if (pw.length < 6) return false;
        if (!/[A-Z]/.test(pw)) return false;
        if (!/[0-9]/.test(pw)) return false;
        return true; // special chars allowed
      }
      document.getElementById('li-go').addEventListener('click', ()=>{
        const email = (document.getElementById('li-email').value||'').trim();
        const pass  = (document.getElementById('li-pass').value||'');
        if (!email){ alert('Enter email.'); return; }
        if (!passwordOK(pass)){ alert('Password must be 6+ chars with 1 capital and 1 number.'); return; }

        // Demo account (optional): demo@dowsonfarms.com / Demo123
        const demoOK = email.toLowerCase()==='demo@dowsonfarms.com' && pass==='Demo123';
        if (!demoOK){
          // For now, allow any valid combo (you can lock this down later)
          // alert('Invalid login'); return; // <-- uncomment to enforce demo-only
        }

        try { localStorage.setItem('df_user', email); } catch {}
        // Navigate to app
        location.href = 'index.html#/';
      });
    })();
  </script>
</body>
</html>
