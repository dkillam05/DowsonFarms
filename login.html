<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Login • Dowson Farms</title>
  <link rel="icon" href="icons/logo.png" />
  <style>
    :root{
      --bg:#f6f3e4; --fg:#1a1a1a; --muted:#6e6e6e;
      --tile:#fff; --bd:rgba(0,0,0,.08); --brand:#0f4d1d;
    }
    html,body{height:100%}
    body{
      margin:0; background:var(--bg); color:var(--fg);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      display:flex; flex-direction:column; min-height:100vh;
    }
    .login-wrap{
      flex:1; display:flex; align-items:center; justify-content:center; padding:24px 12px;
    }
    .card{
      width:min(520px, 92vw);
      background:#fff; border:1px solid var(--bd); border-radius:14px;
      box-shadow:0 6px 18px rgba(0,0,0,.06);
      padding:18px;
    }
    .brand{
      display:flex; flex-direction:column; align-items:center; gap:8px; margin-bottom:8px;
    }
    .brand img{ width:64px; height:64px; border-radius:50%; }
    .brand .t1{ font-weight:800; font-size:20px; letter-spacing:.2px; }
    .brand .t2{ color:var(--muted); font-size:12px; }
    .field{ margin:10px 0; }
    label{ display:block; font-weight:600; font-size:13px; margin-bottom:6px; color:#333; }
    input{
      width:100%; border:1px solid var(--bd); border-radius:10px; background:#fff;
      padding:12px; font-size:16px; /* prevent iOS zoom */
    }
    .pass-row{ display:flex; gap:8px; align-items:stretch; }
    .btn-primary{
      background:var(--brand); color:#fff; border:0; border-radius:10px; padding:12px 14px; cursor:pointer;
      font-weight:700;
    }
    .row-actions{
      display:flex; justify-content:space-between; align-items:center; margin-top:8px;
    }
    .link{ color:inherit; text-decoration:none; font-weight:600; }
    .link:hover{ text-decoration:underline; }
    footer.site-foot{
      border-top:1px solid var(--bd); background:#efe9d0;
    }
    .foot-inner{
      max-width:980px; margin:0 auto; padding:10px 12px;
      display:flex; align-items:center; justify-content:center; gap:10px; color:var(--muted); font-weight:600;
      flex-wrap:wrap;
    }
    .meta{ display:flex; gap:12px; flex-wrap:wrap; }
  </style>
</head>
<!-- IMPORTANT: data-page="login" tells app.js to skip SPA boot -->
<body data-page="login">
  <main class="login-wrap">
    <section class="card" aria-label="Sign in">
      <div class="brand">
        <img src="icons/logo.png" alt="Dowson Farms">
        <div class="t1">Dowson Farms</div>
        <div class="t2">Sign in to continue</div>
      </div>

      <div class="field">
        <label for="li-email">Email</label>
        <input id="li-email" type="email" autocomplete="username" placeholder="you@example.com" />
      </div>

      <div class="field">
        <label for="li-pass">Password</label>
        <div class="pass-row">
          <input id="li-pass" type="password" autocomplete="current-password" placeholder="Password (min 7, 1 uppercase, 1 number)" />
          <button id="li-toggle" class="btn-primary" aria-label="Show/Hide password" title="Show/Hide">👁️</button>
        </div>
      </div>

      <div class="row-actions">
        <button id="li-go" class="btn-primary">Log In</button>
        <a id="li-forgot" href="#" class="link">Forgot password?</a>
      </div>
    </section>
  </main>

  <footer id="footer" class="site-foot">
    <div class="foot-inner">
      <span>© Dowson Farms</span>
      <span aria-hidden="true">•</span>
      <span id="version">v0.0.0</span>
      <span aria-hidden="true">•</span>
      <span id="foot-datetime" class="meta"></span>
    </div>
  </footer>

  <!-- Load your main app so it can paint version/date/time, but guarded to NOT boot SPA -->
  <script src="app.js" defer></script>
  <script>
    // Minimal login-only behavior (runs after app.js loads):
    (function(){
      function $(s, r=document){ return r.querySelector(s); }

      // Show/Hide password
      $('#li-toggle')?.addEventListener('click', (e)=>{
        e.preventDefault();
        const p = $('#li-pass');
        if (!p) return;
        p.type = (p.type === 'password') ? 'text' : 'password';
      });

      // Forgot password — demo behavior only
      $('#li-forgot')?.addEventListener('click', (e)=>{
        e.preventDefault();
        const email = String($('#li-email')?.value||'').trim();
        if (!email){ alert('Enter your email first.'); return; }
        // Simulate: if email == demo, "send" reset; else deny.
        if (/^demo@dowsonfarms\.com$/i.test(email)){
          alert('Password reset link sent to your email.');
        } else {
          alert('No account found for that email.');
        }
      });

      // Simple password policy: >=7 chars, 1 uppercase, 1 number
      function passOK(s){
        return /[A-Z]/.test(s) && /\d/.test(s) && String(s).length >= 7;
      }

      $('#li-go')?.addEventListener('click', ()=>{
        const email = String($('#li-email')?.value||'').trim();
        const pass  = String($('#li-pass')?.value||'');
        if (!email || !pass){ alert('Enter email and password.'); return; }
        if (!passOK(pass)){ alert('Password must be at least 7 chars, include one uppercase and one number.'); return; }

        // Demo account
        const isDemo = /^demo@dowsonfarms\.com$/i.test(email) && pass === 'Demo123';
        if (!isDemo){
          alert('Invalid credentials (demo: demo@dowsonfarms.com / Demo123)'); return;
        }
        try { localStorage.setItem('df_user', email); } catch {}

        // Go to app
        location.href = './# /home'.replace(' ',''); // ensure hash exists
      });

      // Paint date/time in footer (app.js will also do this, but this ensures it’s present if app.js delays)
      function paintDateTime(){
        const el = $('#foot-datetime'); if (!el) return;
        const now = new Date();
        const date = now.toLocaleDateString(undefined, { month:'long', day:'numeric', year:'numeric' });
        const time = now.toLocaleTimeString(undefined, { hour:'numeric', minute:'2-digit' });
        el.textContent = `${date} • ${time}`;
      }
      paintDateTime();
      // refresh time every minute
      setInterval(paintDateTime, 60_000);
    })();
  </script>
</body>
</html>
