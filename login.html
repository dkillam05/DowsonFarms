<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dowson Farms — Login</title>
  <meta name="color-scheme" content="light dark" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Fallback meta refresh after 1s in case JS is blocked -->
  <meta http-equiv="refresh" content="1;url=./#/login">
</head>
<body style="display:grid;place-items:center;min-height:100vh;">
  <div style="text-align:center;max-width:480px;padding:16px;">
    <h1>Redirecting to login…</h1>
    <p>If you are not redirected automatically, <a href="./#/login">tap here</a>.</p>
  </div>

  <script>
    // Always convert real page load to hash route under index.html
    (function () {
      // If already on the correct hash, bounce to index immediately
      if (location.hash && location.hash.startsWith('#/')) {
        location.replace('./');
        return;
      }
      location.replace('./#/login');
    })();
  </script>
</body>
</html>
