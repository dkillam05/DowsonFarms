<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Dowson Farms — Login</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      height:100vh; margin:0; background:#f6f3e4; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    .login-box {
      background:#fff; padding:24px; border-radius:16px;
      box-shadow:0 4px 20px rgba(0,0,0,.1); width:90%; max-width:380px;
    }
    .login-box h1 { margin:0 0 4px; font-size:24px; }
    .login-box p { margin:0 0 20px; color:#666; }
    .field { margin:12px 0; }
    label { display:block; font-weight:600; margin-bottom:6px; }
    input {
      width:100%; padding:12px; border-radius:10px;
      border:1px solid #ccc; font-size:16px;
    }
    .pw-wrap { position:relative; }
    .pw-wrap input { padding-right:70px; }
    .toggle {
      position:absolute; top:50%; right:10px; transform:translateY(-50%);
      background:none; border:0; font-size:14px; cursor:pointer; color:#0f4d1d;
    }
    .error {
      display:none; color:#b00020; font-size:14px; margin-top:6px;
    }
    .actions {
      display:flex; justify-content:space-between; align-items:center; margin-top:20px;
    }
    .btn {
      background:#0f4d1d; color:#fff; padding:10px 16px; border:0; border-radius:10px;
      cursor:pointer; font-size:16px; font-weight:600;
    }
    .link { color:#0f4d1d; text-decoration:none; font-size:14px; }
    .foot {
      margin-top:24px; font-size:14px; color:#666; text-align:center;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Welcome back</h1>
    <p>Sign in to continue.</p>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com">
    </div>

    <div class="field pw-wrap">
      <label for="pass">Password</label>
      <input id="pass" type="password" placeholder="Password">
      <button type="button" id="togglePass" class="toggle">Show</button>
    </div>

    <div id="err" class="error">These credentials are not recognized.</div>

    <div class="actions">
      <a href="#" class="link">Forgot password?</a>
      <button id="go" class="btn">Log In</button>
    </div>
  </div>

  <div class="foot">
    <span id="footerDate"></span> • <span id="footerVersion"></span>
  </div>

  <script>
    // Footer date/version
    function fmtDate(){
      const d = new Date();
      return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    }
    document.getElementById('footerDate').textContent = fmtDate();
    document.getElementById('footerVersion').textContent = (window.DF?.VERSION || 'v0.0.0');

    // Toggle password visibility
    const passInput = document.getElementById('pass');
    const toggleBtn = document.getElementById('togglePass');
    toggleBtn.addEventListener('click',()=>{
      if (passInput.type === 'password'){
        passInput.type = 'text'; toggleBtn.textContent='Hide';
      } else {
        passInput.type = 'password'; toggleBtn.textContent='Show';
      }
    });

    // Validation helpers
    const strong = (s)=> /[A-Z]/.test(s) && /\d/.test(s) && s.length >= 6;

    // Demo account (front-end only)
    const DEMO = { email:'demo@dowsonfarms.com', pass:'Demo123' };

    // Log In
    document.getElementById('go').addEventListener('click', ()=>{
      const email = (document.getElementById('email').value||'').trim().toLowerCase();
      const pass  = document.getElementById('pass').value||'';
      const err   = document.getElementById('err');

      err.style.display = 'none';
      if (!strong(pass)) {
        err.textContent = 'Password must include 1 capital, 1 number, and be 6+ chars.';
        err.style.display = 'block';
        return;
      }
      if (email === DEMO.email && pass === DEMO.pass) {
        try { localStorage.setItem('df_user', email); } catch {}
        location.replace('./#/home'); // go to app
        return;
      }
      err.textContent = 'These credentials are not recognized.';
      err.style.display = 'block';
    });
  </script>
</body>
</html>
