<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Login • Dowson Farms</title>
  <link rel="icon" href="icons/logo.png">
  <style>
    :root{
      --bg:#f6f3e4; --fg:#1a1a1a; --muted:#6e6e6e;
      --tile:#fff; --bd:rgba(0,0,0,.10); --brand:#0f4d1d;
    }
    html,body{height:100%}
    body{
      margin:0; background:var(--bg); color:var(--fg);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      display:flex; align-items:center; justify-content:center;
    }
    .wrap{ width:100%; max-width:440px; padding:16px; }
    .card{
      background:#fff; border:1px solid var(--bd); border-radius:16px;
      box-shadow:0 10px 24px rgba(0,0,0,.06);
      padding:22px 16px 18px;
    }
    .logo{
      display:flex; align-items:center; justify-content:center; margin-bottom:10px;
    }
    .logo img{ width:64px; height:64px; border-radius:12px; display:block; }
    h1{ margin:6px 0 14px; text-align:center; font-size:24px; }
    .field{ margin:10px 0; }
    label{ display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
    .input{
      display:flex; align-items:center; gap:8px;
      border:1px solid var(--bd); background:#fff; border-radius:12px; padding:10px 12px;
    }
    .input input{
      border:0; outline:0; flex:1; font-size:16px; background:transparent;
    }
    .eye{
      width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center;
      border:0; background:transparent; cursor:pointer; opacity:.7;
    }
    .eye:active{ transform:scale(.96); }
    .actions{ display:flex; gap:10px; align-items:center; margin-top:10px; }
    .btn-primary{
      background:var(--brand); color:#fff; border:0; border-radius:12px; padding:10px 14px;
      font-weight:600; flex:1; cursor:pointer;
    }
    .link{ text-decoration:none; font-size:14px; color:inherit; opacity:.8; }
    .foot{
      text-align:center; color:var(--muted); margin-top:10px; font-size:14px; font-weight:600;
    }
    /* modal */
    dialog{
      border:1px solid var(--bd); border-radius:12px; padding:16px; max-width:420px;
      box-shadow:0 15px 30px rgba(0,0,0,.12);
    }
    dialog::backdrop{ background:rgba(0,0,0,.3); }
    .row{ display:flex; gap:10px; margin:8px 0; }
    .row .btn{ padding:8px 12px; border-radius:10px; border:1px solid var(--bd); background:#fff; cursor:pointer; }
    .row .btn-primary{ background:var(--brand); color:#fff; border:0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="region" aria-label="Login form">
      <div class="logo">
        <img src="icons/logo.png" alt="Dowson Farms logo">
      </div>
      <h1>Log In</h1>

      <div class="field">
        <label for="li-email">Username</label>
        <div class="input">
          <input id="li-email" type="email" inputmode="email" autocomplete="username"
                 placeholder="email">
        </div>
      </div>

      <div class="field">
        <label for="li-pass">Password</label>
        <div class="input">
          <input id="li-pass" type="password" autocomplete="current-password"
                 placeholder="Password" minlength="7">
          <button id="li-eye" class="eye" type="button" aria-label="Show password"
                  title="Show password">
            <!-- eye icon (toggle fills) -->
            <svg id="eye-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <div class="actions">
        <button id="li-go" class="btn-primary" type="button">Log In</button>
        <a id="li-forgot" href="#" class="link">Forgot password?</a>
      </div>
    </div>

    <div class="foot">
      <span id="foot-date">—</span>
      <span aria-hidden="true">•</span>
      <span id="foot-time">—</span>
      <span aria-hidden="true">•</span>
      <span id="foot-version">v0.0.0</span>
    </div>
  </div>

  <!-- Forgot password modal (simple stub) -->
  <dialog id="fp-modal">
    <h3 style="margin:0 0 6px;">Reset Password</h3>
    <p class="muted" style="margin:0 0 8px;">Enter your email and we’ll send reset instructions if it’s a valid account.</p>
    <div class="row">
      <input id="fp-email" type="email" placeholder="you@example.com" style="flex:1; border:1px solid var(--bd); border-radius:10px; padding:8px 10px;">
    </div>
    <div class="row" style="justify-content:flex-end;">
      <button class="btn" id="fp-cancel" type="button">Cancel</button>
      <button class="btn-primary" id="fp-send" type="button">Send</button>
    </div>
  </dialog>

  <script>
    (function(){
      'use strict';

      // --- Version bridge (from ?v= or localStorage) ---
      function readVersion(){
        const u = new URL(location.href);
        const v = u.searchParams.get('v');
        if (v) {
          try { localStorage.setItem('DF_VERSION', v); } catch {}
          return v;
        }
        try {
          const lv = localStorage.getItem('DF_VERSION');
          if (lv) return lv;
        } catch {}
        return 'v?';
      }

      // --- Footer date/time + version paint ---
      function paintFoot(){
        const now = new Date();
        const dateFmt = new Intl.DateTimeFormat(undefined, { year:'numeric', month:'long', day:'numeric' });
        const timeFmt = new Intl.DateTimeFormat(undefined, { hour:'numeric', minute:'2-digit' });
        document.getElementById('foot-date').textContent = dateFmt.format(now);
        document.getElementById('foot-time').textContent = timeFmt.format(now);
        document.getElementById('foot-version').textContent = readVersion();
      }
      paintFoot();
      setInterval(paintFoot, 60_000);

      // --- Eye toggle ---
      const pass = document.getElementById('li-pass');
      const eyeBtn = document.getElementById('li-eye');
      const eyeIcon = document.getElementById('eye-icon');
      eyeBtn.addEventListener('click', ()=>{
        const nowShow = pass.type === 'password';
        pass.type = nowShow ? 'text' : 'password';
        eyeBtn.setAttribute('aria-label', nowShow ? 'Hide password' : 'Show password');
        eyeBtn.title = nowShow ? 'Hide password' : 'Show password';
        // swap icon (very light visual change)
        eyeIcon.innerHTML = nowShow
          ? '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"></path><circle cx="12" cy="12" r="3" fill="currentColor"></circle>'
          : '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"></path><circle cx="12" cy="12" r="3"></circle>';
      });

      // --- Forgot password modal (client stub) ---
      const modal = document.getElementById('fp-modal');
      document.getElementById('li-forgot').addEventListener('click', (e)=>{
        e.preventDefault();
        modal.showModal();
        document.getElementById('fp-email').focus();
      });
      document.getElementById('fp-cancel').addEventListener('click', ()=> modal.close());
      document.getElementById('fp-send').addEventListener('click', ()=>{
        const email = (document.getElementById('fp-email').value || '').trim();
        if (!email) { alert('Please enter your email.'); return; }
        // Here you’d call your backend. For now we simulate success.
        alert('If that email exists, a reset link has been sent.');
        modal.close();
      });

      // --- Simple client-side login (demo) ---
      function passwordValid(pw){
        // ≥7 chars, one capital, one number (special allowed)
        return pw.length >= 7 && /[A-Z]/.test(pw) && /\d/.test(pw);
      }

      document.getElementById('li-go').addEventListener('click', ()=>{
        const email = (document.getElementById('li-email').value || '').trim();
        const pw    = (pass.value || '').trim();
        if (!email) { alert('Enter your email.'); return; }
        if (!passwordValid(pw)) {
          alert('Password must be 7+ chars with at least 1 capital and 1 number.');
          return;
        }
        try { localStorage.setItem('df_user', email); } catch {}

        // Redirect to index.html#/home in the same folder (works on GitHub Pages subpath)
        const base = location.pathname.replace(/login\.html$/,'');
        location.assign(base + 'index.html#/home');
      });

      // Enter key submits
      document.getElementById('li-email').addEventListener('keydown', (e)=>{ if (e.key === 'Enter') document.getElementById('li-go').click(); });
      pass.addEventListener('keydown', (e)=>{ if (e.key === 'Enter') document.getElementById('li-go').click(); });
    })();
  </script>
</body>
</html>
