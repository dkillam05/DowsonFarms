<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login — Dowson Farms</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Simple centered login */
    body { background:#fff; }
    .login-wrap{
      min-height:100vh;
      padding-top: calc(env(safe-area-inset-top,0px) + 40px);
      padding-bottom: calc(env(safe-area-inset-bottom,0px) + 40px);
      display:flex; align-items:center; justify-content:center;
    }
    .login-card{
      width:min(92vw, 420px);
      background:#fff; border:1px solid #ddd; border-radius:12px;
      box-shadow:0 6px 20px rgba(0,0,0,.08);
      padding:20px;
    }
    .login-card h1{ margin:0 0 12px; color:#1B5E20; font-size:1.4em; }
    .login-card .field{ margin:10px 0; }
    .login-card .btn-primary{ width:100%; margin-top:8px; }
    .hint{ color:#666; font-size:.9em; margin-top:8px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="login-form">
      <h1>Dowson Farms Login</h1>
      <div class="field">
        <label>Email</label>
        <input id="email" type="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••" required>
      </div>
      <button class="btn-primary" type="submit">Login</button>
      <div class="hint">Invite-only access.</div>
    </form>
  </div>

  <script>
    // Minimal fake auth: mark authed and go to app
    document.getElementById('login-form').addEventListener('submit', (e)=>{
      e.preventDefault();
      try { localStorage.setItem('df_auth','1'); } catch {}
      location.replace('index.html');
    });
  </script>
</body>
</html>
