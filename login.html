<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login • Dowson Farms</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { display: grid; place-items: center; min-height: 100vh; background: var(--ivory); }
    .login-card {
      width: min(460px, 92vw);
      background: #fff;
      border: 2px solid var(--green);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .login-card h1 { margin: 8px 0 12px; color: var(--green); }
    .login-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:10px; }
    .brand { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .brand img { height: 40px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <img src="icons/logo.png" alt="DF">
      <h1>Dowson Farms</h1>
    </div>
    <p class="muted">Invite-only access.</p>
    <div class="field"><input id="email" type="email" placeholder="Email"></div>
    <div class="field"><input id="pass" type="password" placeholder="Password"></div>
    <div class="login-actions">
      <button id="signin" class="btn-primary">Sign in</button>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
