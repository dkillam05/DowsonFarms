<!doctype html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Login — Dowson Farms</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#1B5E20">
  <style>
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .login-card{width:100%;max-width:420px;background:#fff;color:#000;border-radius:16px;padding:20px;
      box-shadow:0 10px 30px rgba(0,0,0,.15);border:1px solid rgba(0,0,0,.08);}
    html[data-theme="dark"] .login-card{background:#121612;color:#eaeaea;border-color:#222;}
    .login-card h1{margin:.4rem 0 1rem;}
    .login-card .field{margin:10px 0;}
    .brand{font-weight:800;color:#1B5E20;}
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1><span class="brand">Dowson Farms</span></h1>
      <p class="muted">Invite-only access.</p>
      <div class="field"><label>Email</label><input id="email" type="email" placeholder="name@example.com" autocomplete="username"></div>
      <div class="field"><label>Password</label><input id="password" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button id="login-btn" class="btn-primary" style="width:100%;">Sign in</button>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
