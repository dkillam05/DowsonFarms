<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Login — Dowson Farms</title>
  <meta name="theme-color" content="#1b5e20" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body{display:flex;min-height:100vh;align-items:center;justify-content:center;background:var(--page-bg,#f6f6e8);}
    .card{background:#fff;padding:16px 14px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.08);width:min(92vw,380px);}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .brand img{width:44px;height:44px;border-radius:50%;}
    .brand .t{font-weight:700;font-size:1.1rem;}
    .row{display:grid;gap:8px;margin-top:10px;}
    input{padding:10px 12px;border:1px solid #cfcfcf;border-radius:8px;font-size:16px;}
    .btn{display:inline-block;padding:10px 14px;border-radius:8px;border:0;background:#1b5e20;color:#fff;font-weight:600;}
    .muted{opacity:.7;font-size:.9rem;}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="icons/logo.png" alt="DF" />
      <div class="t">Dowson Farms</div>
    </div>

    <div class="row">
      <input id="email" type="email" placeholder="Email" autocomplete="email" />
      <input id="pw" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="go" class="btn">Login</button>
      <div class="muted">Tip: this is a local-only demo login. No server is used.</div>
    </div>
  </div>

  <script>
  (function boot(){
    const parts = location.pathname.split('/').filter(Boolean);
    const DF_BASE = parts.length ? ('/' + parts[0]) : '';
    const joinBase = p => (DF_BASE + '/' + String(p).replace(/^\/+/,'')).replace(/\/{2,}/g,'/');

    function login(){
      try{
        const e = String(document.getElementById('email').value||'').trim();
        localStorage.setItem('df_user', e);
      }catch(e){}
      location.href = joinBase('/index.html#\u002Fhome');
    }

    document.getElementById('go').addEventListener('click', login);
    document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
  })();
  </script>
</body>
</html>
