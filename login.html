<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dowson Farms — Login</title>
  <link rel="stylesheet" href="styles.css?v=11.0.0" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: var(--ivory);
      margin: 0;
    }
    .login-wrapper {
      width: 100%;
      max-width: 360px;
      padding: 20px;
    }
    .login-box {
      background: #fff;
      border: 2px solid var(--green);
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .login-box h1 {
      font-size: 1.5em;
      margin: 0 0 12px;
      text-align: center;
      color: var(--green);
    }
    .login-box p {
      font-size: 0.9em;
      color: #555;
      text-align: center;
      margin: 0 0 16px;
    }
    .logo {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 12px;
    }
    .logo img {
      height: 64px;
      margin-right: 10px;
    }
    .logo-text {
      font-size: 1.2em;
      font-weight: bold;
      color: var(--green);
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box">
      <div class="logo">
        <img src="icons/logo.png" alt="Dowson Farms Logo" />
        <span class="logo-text">Dowson Farms</span>
      </div>
      <h1>Welcome</h1>
      <p>Use your assigned credentials. 🔒 Never share your password.</p>
      <form id="login-form">
        <div class="field">
          <input type="email" id="login-email" placeholder="Email" required />
        </div>
        <div class="field">
          <input type="password" id="login-pass" placeholder="Password" required />
        </div>
        <button type="submit" class="btn-primary" style="width:100%;margin-top:12px">Log In</button>
      </form>
    </div>
  </div>
  <script src="login.js?v=11.0.0"></script>
</body>
</html>
