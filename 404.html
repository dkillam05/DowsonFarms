<!doctype html>
<meta charset="utf-8">
<title>Redirecting…</title>
<script>
(function(){
  // If someone lands on https://dkillam05.github.io/ (no repo path) or a wrong deep link,
  // push them to /DowsonFarms/ while preserving the remainder.
  var path = location.pathname, parts = path.split('/').filter(Boolean);
  var REPO = 'DowsonFarms';
  if (!parts.length || parts[0] !== REPO){
    var rest = parts.join('/');
    var dest = '/' + REPO + '/';
    if (rest && !/index\.html$/i.test(rest)) dest += rest;
    dest += location.search || '';
    dest += location.hash || '';
    location.replace(dest);
  }
})();
</script>
<p>Redirecting…</p>
