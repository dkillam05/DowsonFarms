name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build
        run: echo "No build step needed for static PWA"

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .  # Deploy root folder
          branch: gh-pages  # Creates/updates gh-pages branch
          clean: true  # Cleans old files
