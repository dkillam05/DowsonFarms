<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reset Dowson Farms SW</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;padding:24px} .muted{color:#666}</style>
</head>
<body>
  <h1>Resetting cache…</h1>
  <p class="muted">This will remove the old service worker and caches, then reload the app.</p>
  <script>
  (async () => {
    try {
      // Unregister all service workers for this origin
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
      // Clear all caches
      if (window.caches) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
    } catch (e) { console.warn(e); }
    // Reload fresh app (project-relative path for GitHub Pages)
    location.replace('./index.html?v=10.14.7');
  })();
  </script>
  <noscript>Please enable JavaScript, then reload this page.</noscript>
</body>
</html>
