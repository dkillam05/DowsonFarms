<!doctype html>
<html lang="en" data-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f0f0f" />

    <title>Dowson Farms</title>

    <!-- PWA (safe if missing) -->
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Prevent flash when switching themes -->
    <style>
      :root{ --page-bg-light:#f6f6e8; --page-bg-dark:#0f0f0f; --page-bg:var(--page-bg-light); }
      [data-theme="light"]{ --page-bg:var(--page-bg-light); }
      [data-theme="dark"] { --page-bg:var(--page-bg-dark); }
      [data-theme="auto"]{ --page-bg:var(--page-bg-light); }
      @media (prefers-color-scheme: dark){
        [data-theme="auto"]{ --page-bg:var(--page-bg-dark); }
      }
      html,body{ background:var(--page-bg); }
    </style>
  </head>

  <body>
    <!-- ===== Header ===== -->
    <header id="header" class="site-head">
      <div class="container head-inner">
        <div class="brand">
          <img src="icons/logo.png" alt="Dowson Farms" class="logo" />
          <span class="title">Dowson Farms</span>
        </div>

        <div class="head-right">
          <div class="today-wrap">
            <span id="today" class="today"></span>
            <span aria-hidden="true">•</span>
            <span id="clock" class="clock"></span>
          </div>
          <a id="logout" href="logout" class="btn btn-ghost" title="Log out">Logout</a>
        </div>
      </div>

      <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumb"></nav>
    </header>

    <!-- ===== Update banner (hidden by default, app.js toggles) ===== -->
    <aside id="update-banner" class="update-banner" hidden>
      <div class="container">
        <span>There’s a new version available.</span>
        <button id="update-refresh" class="btn btn-primary">Update</button>
      </div>
    </aside>

    <!-- ===== App content ===== -->
    <main id="app" class="app" role="main" aria-live="polite"></main>

    <!-- ===== Footer (version filled by app.js via #version) ===== -->
    <footer id="footer" class="site-foot">
      <div class="container foot-inner">
        <span>© Dowson Farms</span>
        <span aria-hidden="true">•</span>
        <span id="version">v0.0.0</span>
      </div>
    </footer>

    <!-- App code (v11.x; your router, screens, patches live here) -->
    <script defer src="app.js"></script>
  </body>
</html>
