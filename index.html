<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Dowson Farms</title>

  <!-- PWA basics -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1B5E20">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

  <!-- App styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header" role="banner">
    <div class="logo">
      <img src="icons/logo.png" alt="Dowson Farms Logo" />
      <span class="logo-text">Dowson Farms</span>
    </div>
    <div class="header-right">
      <div id="date" class="date">—</div>
      <div id="clock" class="clock">—</div>
      <a class="logout" href="#/login" aria-label="Logout">Logout</a>
    </div>
  </header>

  <!-- Breadcrumbs (sticky under header) -->
  <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumb"></nav>

  <!-- Content -->
  <main id="content" role="main">
    <!-- Your router will inject views here -->
  </main>

  <!-- Footer (optional; fixed) -->
  <footer class="app-footer" role="contentinfo">
    <div>© <span id="year">2025</span> Dowson Farms • All rights reserved</div>
  </footer>

  <!-- App script -->
  <script src="app.js" defer></script>
  <script>
    // Simple year + start clock/date (non-conflicting helpers)
    document.addEventListener('DOMContentLoaded', () => {
      const y = document.getElementById('year');
      if (y) y.textContent = String(new Date().getFullYear());

      const dateEl = document.getElementById('date');
      const clockEl = document.getElementById('clock');
      function tick() {
        const now = new Date();
        if (dateEl) dateEl.textContent = now.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
        if (clockEl) clockEl.textContent = now.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
      }
      tick();
      setInterval(tick, 15000);
    });
  </script>
</body>
</html>
