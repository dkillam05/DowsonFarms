<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#154d23" />
  <title>Dowson Farms</title>

  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Header -->
  <header id="site-header" class="site-head">
    <div class="container head-inner">
      <a class="brand" href="#/home" aria-label="Dowson Farms">
        <img class="brand-logo" alt="Dowson Farms" src="icons/logo.png" />
        <span class="brand-text">Dowson Farms</span>
      </a>
      <span class="head-dot" aria-hidden="true">•</span>
      <button id="logout-btn" class="btn" type="button">Logout</button>
    </div>
  </header>

  <!-- Main app outlet -->
  <main id="app" class="app"></main>

  <!-- Footer -->
  <footer id="site-footer" class="site-foot">
    <div class="container foot-inner">
      <span>© Dowson Farms</span>
      <span aria-hidden="true">•</span>
      <span id="version">v0.0.0</span>
    </div>
  </footer>

  <!-- App bundle (single source of truth for VERSION) -->
  <script defer src="app.js"></script>
</body>
</html>
