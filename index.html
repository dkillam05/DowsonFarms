<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dowson Farms</title>

  <!-- App icons / PWA bits (safe even if you don't use SW today) -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" sizes="512x512" href="icons/icon-512.png" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===== Header ===== -->
  <header id="header" class="site-head">
    <div class="container head-inner">
      <div class="brand">
        <img class="brand-logo" src="icons/logo.png" alt="Dowson Farms logo" width="40" height="40" />
        <span class="brand-name">Dowson Farms</span>
      </div>

      <nav class="head-nav">
        <span class="dot" aria-hidden="true">•</span>
        <!-- IMPORTANT: SPA route link (no full page load) -->
        <a id="logoutBtn" href="#/login" class="btn">Logout</a>
      </nav>
    </div>
  </header>

  <!-- ===== Main app root ===== -->
  <main id="app" class="container" role="main"></main>

  <!-- ===== Footer (version filled by app.js) ===== -->
  <footer id="footer" class="site-foot">
    <div class="container foot-inner">
      <span>© Dowson Farms</span>
      <span aria-hidden="true">•</span>
      <span id="version">v0.0.0</span>
    </div>
  </footer>

  <!-- App code -->
  <script defer src="app.js"></script>
</body>
</html>
