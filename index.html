<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dowson Farms PWA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="logo">
      <img src="icons/logo.png" alt="DF">
      <div class="logo-text">Dowson Farms</div>
    </div>
    <div id="clock" class="small" style="margin-left:8px;"></div>
    <button id="logout" class="logout" aria-label="Logout">Logout</button>
  </header>

  <!-- Breadcrumbs -->
  <nav id="breadcrumbs" class="breadcrumbs"><span>Home</span></nav>

  <!-- Update banner (sits just above footer) -->
  <div id="update-banner" hidden>
    New Update Available
    <button id="update-refresh" class="btn">Refresh</button>
  </div>

  <!-- Main app -->
  <main id="app" tabindex="-1" aria-live="polite"></main>

  <!-- Footer -->
  <footer class="app-footer">
    <div><strong id="version">v0.0</strong></div>
    <div id="today" class="small"></div>
  </footer>

  <script defer src="app.js"></script>
</body>
</html>
