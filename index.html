<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Dowson Farms</title>

  <!-- PWA / Icons -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" sizes="512x512" href="icons/icon-512.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
  <meta name="theme-color" content="#1b5e20" />
  <meta name="color-scheme" content="light dark" />
</head>
<body data-theme="auto">
  <!-- App header (keep markup you already use) -->
  <header class="app-bar" id="app-bar">
    <div class="brand">
      <img src="icons/logo.png" alt="Dowson Farms" class="brand-logo" />
      <span class="brand-name">Dowson Farms</span>
    </div>
    <!-- IMPORTANT: hash route only so it never navigates away -->
    <a id="btn-logout" class="btn">Logout</a>
  </header>

  <!-- App root -->
  <main id="app" role="main" tabindex="-1"></main>

  <!-- Footer -->
  <footer class="site-foot">
    <small>© Dowson Farms <span id="version">v11.0.8</span></small>
  </footer>

  <noscript>
    <div style="padding:12px;color:#b00020">This app requires JavaScript.</div>
  </noscript>

  <!-- ------ Boot strap (minimal) ------- -->
  <script>
  (function () {
    'use strict';

    // ---- Version used by SW busting and footer label
    const APP_VERSION = '11.0.0';
    try { document.getElementById('version').textContent = 'v' + APP_VERSION; } catch {}

    // ---- Safe logout: clear auth + go to hash route (no real path = no 404)
    function doLogout() {
      try {
        localStorage.removeItem('df_user');
        sessionStorage.clear();
      } catch {}
      // stay on index.html, just change the hash
      location.hash = '#/login';
      // give your router a nudge if needed
      if (typeof window.route === 'function') { try { window.route(); } catch {} }
    }

    // Wire the header button (works even before your router mounts)
    document.getElementById('btn-logout')?.addEventListener('click', function (e) {
      e.preventDefault();
      doLogout();
    });

    // If someone somehow navigates to /login (path), normalize back to hash
    (function normalizeEntry() {
      const badPath = /\/login(\.html)?$/i.test(location.pathname);
      if (badPath) {
        location.replace('./#/login');
        return;
      }
      // First-time visitors without a hash can land on your home (adjust as needed)
      if (!location.hash) {
        location.replace('#/home');
      }
    })();

    // ---- Register service worker with version busting
    if ('serviceWorker' in navigator) {
      const swUrl = 'service-worker.js?v=' + encodeURIComponent(APP_VERSION);
      navigator.serviceWorker.register(swUrl).catch(()=>{});
    }
  })();
  </script>

  <!-- Your application bundle -->
  <script src="app.js"></script>
</body>
</html>
