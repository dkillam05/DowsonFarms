<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dowson Farms App</title>
  <meta name="theme-color" content="#1B5E20" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css?v=10000" />
</head>
<body>
  <!-- ===== Header ===== -->
  <header class="app-header">
    <div class="logo">
      <img src="icons/logo.png" alt="Dowson Farms Logo" />
      <span class="logo-text">Dowson Farms</span>
    </div>
    <span id="clock"></span>
    <button id="logout" class="logout">Logout</button>
  </header>

  <!-- ===== Breadcrumbs ===== -->
  <nav id="breadcrumbs" class="breadcrumbs"></nav>

  <!-- ===== Update Banner ===== -->
  <div id="update-banner" hidden>
    <span>A new update is available.</span>
    <button id="update-refresh" class="btn-primary">Refresh</button>
  </div>

  <!-- ===== Main App Area ===== -->
  <main id="app" tabindex="-1"></main>

  <!-- ===== Footer ===== -->
  <footer class="app-footer">
    <span id="today"></span>
    <span id="version"></span>
  </footer>

  <!-- ===== App JS (versioned for cache-bust) ===== -->
  <script src="app.js?v=10000"></script>
</body>
</html>
