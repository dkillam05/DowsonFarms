<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#1B5E20" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dowson Farms" />
  <meta name="description" content="Dowson Farms PWA" />

  <title>Dowson Farms</title>

  <!-- Icons / PWA -->
  <link rel="icon" type="image/png" href="icons/favicon.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css?v=11.0.0" />
</head>
<body>
  <!-- ===== Fixed Header ===== -->
  <header class="app-header" role="banner" aria-label="Dowson Farms Header">
    <div class="logo" aria-label="Logo">
      <img src="icons/logo.png" alt="Dowson Farms" />
      <div class="logo-text">Dowson Farms</div>
    </div>

    <div id="today" class="small" aria-live="polite" style="margin-left:12px;"></div>
    <div id="clock" class="small" aria-live="polite"></div>

    <button id="logout" class="logout" type="button" title="Sign out">Logout</button>
  </header>

  <!-- ===== Breadcrumbs ===== -->
  <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumbs">
    <!-- Filled by app.js -->
  </nav>

  <!-- ===== Update Banner (SW) ===== -->
  <div id="update-banner" hidden role="alert">
    A new version is ready.
    <button id="update-refresh" class="btn" type="button" style="margin-left:8px;">Refresh</button>
  </div>

  <!-- ===== Main App Mount ===== -->
  <main id="app" tabindex="-1">
    <!-- Views are rendered here by app.js -->
    <noscript>
      <p class="muted">This app requires JavaScript to run.</p>
    </noscript>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="app-footer" role="contentinfo">
    <div>© Dowson Farms</div>
    <div id="version" aria-label="App Version">v11.0.0</div>
  </footer>

  <!-- ===== App Script(s) =====
       For v11 we’ll split into multiple parts; for now, this keeps the current app working.
       When we deliver app.part-*.js, we’ll replace with several <script defer> tags in order.
  -->
  <script src="app.js?v=11.0.1" defer></script>
</body>
</html>
