<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Dowson Farms</title>

  <!-- PWA basics -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#1b5e20" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="auto">
  <header class="app-header">
    <div class="brand">
      <img alt="DF" src="icons/logo.png" class="brand-logo" />
      <div class="brand-name">Dowson Farms</div>
    </div>
    <!-- NOTE: href is normalized by the bootstrap script below -->
    <a id="logout" class="btn" href="/login.html">Logout</a>
  </header>

  <main id="app" class="app-main">
    <!-- Your SPA will render here -->
  </main>

  <footer class="app-foot">
    <div>© Dowson Farms</div>
    <div id="version">v11.0.8</div>
  </footer>

  <!-- ──────────────────────────────────────────────────────────────
       Bootstrap: base-path + version wiring (no app code touched)
       ────────────────────────────────────────────────────────────── -->
  <script>
  (function bootstrap(){
    // Update this when you intentionally bump versions
    const DF_VERSION = '11.0.8';
    (function setFooter(){
      try { var v=document.getElementById('version'); if(v) v.textContent='v'+DF_VERSION; } catch(e){}
    })();

    // Detect GitHub Pages repo base (e.g. /DowsonFarms). If served from root, this is ''.
    const parts = location.pathname.split('/').filter(Boolean);
    const DF_BASE = parts.length ? ('/' + parts[0]) : '';

    function joinBase(p){ return (DF_BASE + '/' + String(p).replace(/^\/+/,'')).replace(/\/{2,}/g,'/'); }

    // Normalize any anchor that points to a root path or plain file
    function normalizeAll(){
      document.querySelectorAll('a[href]').forEach(a=>{
        const href = a.getAttribute('href')||'';
        if (!href || /^https?:\/\//i.test(href) || href.startsWith('#')) return;

        // Already includes base?
        if (DF_BASE && href.startsWith(DF_BASE+'/')) return;

        // Root-relative → prefix base
        if (href.startsWith('/')) { a.setAttribute('href', joinBase(href)); return; }

        // Bare file like "login.html" → prefix base
        if (!href.startsWith('./') && !href.startsWith('../')) {
          a.setAttribute('href', joinBase('/'+href));
        }
      });
    }

    // Ensure logout always targets repo path
    function wireLogout(){
      const btn=document.getElementById('logout');
      if (btn) btn.setAttribute('href', joinBase('/login.html'));
    }

    // Kick now & after SPA route changes
    function kick(){
      wireLogout();
      normalizeAll();
      setTimeout(normalizeAll, 0);
      setTimeout(normalizeAll, 250);
      setTimeout(normalizeAll, 1000);
    }

    if (document.readyState === 'loading'){
      document.addEventListener('DOMContentLoaded', kick, {once:true});
    } else { kick(); }

    window.addEventListener('hashchange', ()=>setTimeout(normalizeAll,0), {passive:true});
    document.addEventListener('click', ()=>setTimeout(normalizeAll,0), true);

    // Expose helpers (optional)
    window.__DF_VERSION__ = DF_VERSION;
    window.__DF_BASE__ = DF_BASE;
    window.__dfJoinBase = joinBase;
  })();
  </script>

  <!-- Your existing SPA bundle -->
  <script src="app.js"></script>
  <!-- Your existing service worker registration (if you have one inside app.js, keep that) -->
</body>
</html>
