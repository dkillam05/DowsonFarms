<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Dowson Farms PWA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1B5E20" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Favicons (optional, reuse PWA icons if you want) -->
  <link rel="icon" href="icons/icon-192.png" />
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="app-header" role="banner">
    <div class="header-left">
      <img class="logo" src="icons/logo.png" alt="Dowson Farms logo" width="28" height="28" />
      <span class="brand">Dowson Farms</span>
    </div>

    <div class="header-right">
      <span id="clock" class="clock" aria-live="polite">--:-- --</span>
      <button id="logout" class="logout" type="button" aria-label="Log out">Logout</button>
    </div>
  </header>

  <!-- ===== Breadcrumbs ===== -->
  <nav class="breadcrumbs" aria-label="Breadcrumb">
    <div id="breadcrumbs"><span>Home</span></div>
  </nav>

  <!-- ===== Main App Root ===== -->
  <main id="app" class="app-main" tabindex="-1" aria-live="polite">
    <!-- JS renders content here (Home dashboard, hubs, forms, etc.) -->
  </main>

  <!-- ===== Update Banner (hidden by default; shown by JS when new SW is ready) ===== -->
  <div id="update-banner" class="update-banner" hidden>
    <div class="update-banner__row">
      <span class="update-banner__text">New update available</span>
      <button id="update-refresh" class="update-banner__btn" type="button" aria-live="polite">Refresh</button>
    </div>
  </div>

  <!-- ===== Footer ===== -->
  <footer class="app-footer" role="contentinfo">
    <div class="foot-left">
      <span id="version" title="App version">v0.0</span>
    </div>
    <div class="foot-right">
      <span id="today">—</span>
    </div>
  </footer>

  <!-- ===== Scripts ===== -->
  <script src="app.js"></script>
</body>
</html>
