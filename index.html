<!doctype html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#1b5e20" />
  <title>Dowson Farms</title>

  <!-- PWA / Icons -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />

  <!-- Early bootstrap: set theme + ensure hash BEFORE app.js runs -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('df_theme') || 'auto';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
      try {
        var h = String(location.hash || '').trim();
        if (!h || h === '#') location.replace('#/home');
      } catch (e) {}
    })();
  </script>

  <!-- Critical CSS: keeps header sane even if stylesheet is late/missing -->
  <style>
    :root{ --page-bg-light:#f6f6e8; --page-bg-dark:#0f0f0f; }
    html,body{margin:0;height:100%;background:#0f0f0f;}
    [data-theme="light"] html,[data-theme="light"] body{background:var(--page-bg-light);}
    header.app-header{
      display:flex;justify-content:space-between;align-items:center;
      padding:10px 12px;background:#1b5e20;color:#fff;
    }
    header .brand{display:flex;align-items:center;gap:10px;}
    header .brand .logo{width:44px;height:44px;object-fit:contain;border-radius:4px;}
    header .brand .brand-name{font-size:22px;font-weight:600;}
    main#app{min-height:50vh;}
    .btn{display:inline-block;padding:.5rem .9rem;border-radius:10px;background:#eee;color:#111;text-decoration:none;}
  </style>

  <!-- Main stylesheet (cache-busted) -->
  <link rel="stylesheet" href="styles.css?v=11.0.0" />
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="brand">
      <img src="icons/logo.png" alt="Dowson Farms" class="logo" />
      <span class="brand-name">Dowson Farms</span>
    </div>
    <a id="logout" class="btn" href="logout">Logout</a>
  </header>

  <!-- Update banner -->
  <div id="update-banner" class="update-banner" hidden>
    <span>A new version is available.</span>
    <button id="update-refresh" class="btn-primary" type="button">Refresh</button>
  </div>

  <!-- Breadcrumbs -->
  <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumb"></nav>

  <!-- App root -->
  <main id="app" role="main" tabindex="-1"></main>

  <!-- Footer -->
  <footer class="app-footer">
    <div class="left">© Dowson Farms</div>
    <div class="center" id="version">v11.0.0</div>
    <div class="right">
      <span id="today"></span>
      <span aria-hidden="true"> • </span>
      <span id="clock"></span>
    </div>
  </footer>

  <noscript>
    <div style="padding:1rem; text-align:center; color:#b71c1c;">
      JavaScript is required to run this app.
    </div>
  </noscript>

  <!-- One-time SW cleanup + load app -->
  <script>
    (function(){
      // If an older SW is controlling the page, ask it to unregister once.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs){
          regs.forEach(function(reg){
            // only if scope is this site root; then re-register via app.js later
            if (reg.scope && location.origin.startsWith(reg.scope.replace(/\/$/,''))) {
              try { reg.unregister(); } catch(e){}
            }
          });
        });
      }
    })();
  </script>

  <!-- App (cache-busted) -->
  <script src="app.js?v=11.0.1" defer></script>
</body>
</html>
