<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dowson Farms</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1B5E20">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== Header ===== -->
  <header id="header" class="site-head">
    <div class="container head-inner">
      <a href="#/home" class="brand" aria-label="Dowson Farms Home">
        <img src="icons/logo.png" alt="Dowson Farms Logo" class="brand-logo" width="36" height="36">
        <span class="brand-title">Dowson Farms</span>
      </a>
      <nav class="head-actions">
        <span id="df-clock"></span>
        <button id="logoutBtn" class="btn">Logout</button>
      </nav>
    </div>
  </header>

  <!-- ===== Breadcrumbs ===== -->
  <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumbs"></nav>

  <!-- ===== Main App ===== -->
  <main id="app" class="app"></main>

  <!-- ===== Update Banner ===== -->
  <div id="update-banner" hidden>
    🔄 New update available.
    <button id="reload-app" class="btn">Refresh</button>
  </div>

  <!-- ===== Footer ===== -->
  <footer id="footer" class="site-foot">
    <div class="container foot-inner">
      <span>© Dowson Farms</span>
      <span aria-hidden="true">•</span>
      <span id="df-date"></span>
      <span aria-hidden="true">•</span>
      <span id="version">v0.0.0</span>
    </div>
  </footer>

  <!-- App -->
  <script defer src="app.js"></script>
</body>
</html>
