<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Dowson Farms</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1B5E20">
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="icons/logo.png" alt="Dowson Farms Logo">
      <span class="logo-text">Dowson Farms</span>
    </div>
    <div id="clock"></div>
    <a href="#" class="logout">Logout</a>
  </header>

  <main id="app">
    <nav id="breadcrumbs"></nav>
    <section id="content" class="tiles">
      <a href="#/fields" class="tile">
        <div class="icon">🌾</div>
        <div class="label">Fields</div>
      </a>
      <a href="#/equipment" class="tile">
        <div class="icon">🚜</div>
        <div class="label">Equipment</div>
      </a>
      <a href="#/grain" class="tile">
        <div class="icon">🌽</div>
        <div class="label">Grain</div>
      </a>
      <a href="#/ai-reports" class="tile">
        <div class="icon">🤖</div>
        <div class="label">AI Reports</div>
      </a>
      <a href="#/employees" class="tile">
        <div class="icon">👩‍🌾</div>
        <div class="label">Employees</div>
      </a>
      <a href="#/settings" class="tile">
        <div class="icon">⚙️</div>
        <div class="label">Settings</div>
      </a>
    </section>
  </main>

  <footer>
    <span>&copy; 2025 Dowson Farms</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
