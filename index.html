<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Dowson Farms</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Fixed header -->
  <header class="app-header" role="banner">
    <div class="logo">
      <img src="icons/logo.png" alt="">
      <span class="logo-text">Dowson Farms</span>
    </div>
    <div class="spacer"></div>
    <time id="clock" aria-label="Current time"></time>
    <button id="logout" class="logout" aria-label="Logout">Logout</button>
  </header>

  <!-- Fixed breadcrumbs -->
  <nav class="breadcrumbs" aria-label="Breadcrumb">
    <div id="breadcrumbs"><span>Home</span></div>
  </nav>

  <!-- Scrollable main content -->
  <main id="app" tabindex="-1" role="main" aria-live="polite"></main>

  <!-- Fixed footer -->
  <footer class="app-footer" role="contentinfo">
    <div id="version">v9.1</div>
    <div id="today"></div>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
