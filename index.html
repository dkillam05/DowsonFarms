<!doctype html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Dowson Farms PWA</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#1B5E20">
</head>
<body>
  <header class="app-header">
    <div class="logo">Dowson Farms</div>
    <div class="spacer"></div>
    <div id="clock" class="clock"></div>
    <button id="logout" class="logout">Logout</button>
  </header>

  <nav id="breadcrumbs" class="breadcrumbs"><span>Home</span></nav>

  <main id="app" tabindex="-1"></main>

  <div id="update-banner" hidden>
    <span>New Update Available</span>
    <button id="update-refresh" class="btn-primary">Refresh</button>
  </div>

  <footer class="app-footer">
    <div id="version">v0.0</div>
    <div id="today"></div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
